name: Publish to npm

on:
  push:
    tags:
      - 'v*'
      - 'mcp-server-*'
      - 'core-v*'
      - 'mama-core-*'
      - 'os-v*'
      - 'mama-os-*'
      - 'standalone-v*'

jobs:
  # Publish mama-core first (other packages depend on it)
  publish-mama-core:
    if: startsWith(github.ref, 'refs/tags/core-v') || startsWith(github.ref, 'refs/tags/mama-core-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: packages/mama-core
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies (workspace-level)
        run: pnpm install --ignore-scripts
        working-directory: ${{ github.workspace }}

      - name: Build
        run: pnpm build

      - name: Publish to npmjs.org
        run: npm publish --access public || echo "Already published on npmjs, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          NPM_RC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > "$NPM_RC"
          npm publish --registry https://npm.pkg.github.com --access public || echo "Already published on GitHub Packages, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-mcp-server:
    needs: [publish-mama-core]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/mcp-server-')) && (needs.publish-mama-core.result == 'success' || needs.publish-mama-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: packages/mcp-server
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies (workspace-level)
        run: pnpm install --ignore-scripts
        working-directory: ${{ github.workspace }}

      - name: Replace workspace protocol for publish
        run: |
          CORE_VERSION=$(node -p "require('../mama-core/package.json').version")
          sed -i "s/\"workspace:\*\"/\"^$CORE_VERSION\"/" package.json

      - name: Publish to npmjs.org
        run: npm publish --access public || echo "Already published on npmjs, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          NPM_RC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > "$NPM_RC"
          npm publish --registry https://npm.pkg.github.com --access public || echo "Already published on GitHub Packages, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish mama-os (standalone) - depends on mama-core being published first
  publish-mama-os:
    needs: [publish-mama-core]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/os-v') || startsWith(github.ref, 'refs/tags/mama-os-') || startsWith(github.ref, 'refs/tags/standalone-v')) && (needs.publish-mama-core.result == 'success' || needs.publish-mama-core.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: packages/standalone
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies (workspace-level)
        run: pnpm install --ignore-scripts
        working-directory: ${{ github.workspace }}

      - name: Build (workspace-level for dependency ordering)
        run: pnpm build
        working-directory: ${{ github.workspace }}

      - name: Replace workspace protocol for publish
        run: |
          CORE_VERSION=$(node -p "require('../mama-core/package.json').version")
          sed -i "s/\"workspace:\\*\"/\"^$CORE_VERSION\"/" package.json

      - name: Publish to npmjs.org
        run: npm publish --access public || echo "Already published on npmjs, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          NPM_RC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > "$NPM_RC"
          npm publish --registry https://npm.pkg.github.com --access public || echo "Already published on GitHub Packages, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
